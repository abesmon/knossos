# Конфиг домашнего сервера. Скопировать в homeserver.cfg и поправить.
# Любое значение переопределяется env-переменными (см. README.md / config.py).
[homeserver]
# Домен — часть адресов пользователей (nick@domain). Менять на живом сервере нельзя.
domain = localhost
# Человекочитаемое имя сервера (веб-морда, discovery).
name = VRWeb Home
# Анонсируемая домашняя страница; пусто -> https://{domain}/
homepage =
# Публичный базовый URL сервера (адреса персональных пространств /s/<slug> и
# persist-endpoint); пусто -> https://{domain}. Локально: http://127.0.0.1:8080.
base_url =
# Анонсируемый адрес сигналинга; пусто -> wss://{domain}/signal (встроенный модуль).
signaling_url =
# Куда класть SQLite и подписывающий ключ.
data_dir = data
# Открыта ли регистрация для всех.
registration_open = true
session_ttl_days = 30
cert_ttl_days = 30
host = 0.0.0.0
port = 8080
# Presence «где люди» (docs/presence.md): анонсировать ли presence.v1 и кому отдавать
# выдачу: public — любому, authenticated — только пользователям этого сервера.
presence_enabled = true
presence_access = public

# Теги страниц в presence-выдаче (заполняет админ; ключ — URL страницы, значение —
# теги через запятую). Раскомментировать и заменить примером своего:
# [presence.tags]
# example.com/lobby = hub, official
