# Конфиг домашнего сервера. Скопировать в homeserver.cfg и поправить.
# Любое значение переопределяется env-переменными (см. README.md / config.py).
[homeserver]
# Домен — часть адресов пользователей (nick@domain). Менять на живом сервере нельзя.
domain = localhost
# Человекочитаемое имя сервера (веб-морда, discovery).
name = VRWeb Home
# Анонсируемая домашняя страница; пусто -> https://{domain}/
homepage =
# Анонсируемый адрес сигналинга; пусто -> wss://{domain}/signal (встроенный модуль).
signaling_url =
# Куда класть SQLite и подписывающий ключ.
data_dir = data
# Открыта ли регистрация для всех.
registration_open = true
session_ttl_days = 30
cert_ttl_days = 30
host = 0.0.0.0
port = 8080
