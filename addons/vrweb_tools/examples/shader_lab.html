<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>VRWeb — multiplayer shader editing demo</title>
  <script type="application/vrweb+luau" id="demo.shader-lab">
local editor = document.query("#source-editor")
local apply = document.query("#apply-button")
local diagnostics = document.query("#diagnostics")
local preview = document.query("#shader-plane")

if not editor or not apply or not diagnostics or not preview then
  error("shader demo scene ids are missing")
end

assert(document.features.require("vrweb/shaders/1"))

local initial_source = [[shader_type spatial;
render_mode unshaded;

void fragment() {
  float pulse = 0.5 + 0.5 * sin(AUTHORITY_TIME * 2.0 + UV.x * 10.0);
  ALBEDO = mix(vec3(0.04, 0.12, 0.32), vec3(0.95, 0.18, 0.62), pulse);
}]]

local schema = "shader_source"
local object = "shared_preview"
local version = 1

assert(document.state.define(schema, {
  version = version,
  fields = {
    source = { type = "string", max_bytes = 4096, default = initial_source },
    language = { type = "string", max_bytes = 64, default = "godot-shader" },
    language_version = { type = "string", max_bytes = 16, default = "4.6" },
    shader_type = { type = "string", max_bytes = 32, default = "spatial" },
  },
  default_write_rule = { rank = { op = "lte", value = 1073741824 } },
  commands = {
    publish = {
      reducer = function(event)
        return { state = {
          source = event.args.source,
          language = event.args.language,
          language_version = event.args.language_version,
          shader_type = event.args.shader_type,
        } }
      end,
    },
  },
}))
assert(document.state.ensure(object, schema, {
  source = initial_source,
  language = "godot-shader",
  language_version = "4.6",
  shader_type = "spatial",
}, {}))

local function compile_and_show(state)
  editor.set("text", state.source)
  local result = document.shaders.compile({
    language = state.language,
    version = state.language_version,
    type = state.shader_type,
    source = state.source,
  })
  if not result.ok then
    diagnostics.set("text", "ERROR: " .. tostring(result.error))
    return
  end
  local material = result.shader.create_material()
  if not material or not material.apply(preview, "material_override") then
    diagnostics.set("text", "ERROR: material could not be applied")
    return
  end
  diagnostics.set("text", "SYNCED · " .. state.language .. " " .. state.language_version)
end

compile_and_show(document.state.read(object, schema))
assert(document.state.on(object, schema, function(event)
  compile_and_show(event.state)
end))

assert(editor.on("text_changed", function(_event)
  diagnostics.set("text", "LOCAL DRAFT · press PUBLISH FOR EVERYONE")
end, ""))

assert(apply.on("pressed", function(_event)
  document.state.command(object, schema, version, "publish", {
    source = editor.get("text"),
    language = "godot-shader",
    language_version = "4.6",
    shader_type = "spatial",
  })
end, "Publish shader source"))
  </script>
</head>
<body>
  <vrwml mode="exclusive">
    <WorldEnvironment environment="SubResource:::Environment"/>
    <DirectionalLight3D rotation_degrees="Vector3(-45,-25,0)" light_energy="0.8"/>

    <WorldUiCanvas id="editor-canvas" name="EditorCanvas"
                   position="Vector3(-3.2,2.3,-6)" size="Vector2(5.2,3.4)"
                   viewport_size="Vector2i(1040,680)">
      <PanelContainer anchors_preset="15" anchor_right="1.0" anchor_bottom="1.0">
        <VBoxContainer theme_override_constants_separation="12">
          <Label text="MULTIPLAYER GODOT SHADER" theme_override_font_sizes_font_size="30"/>
          <CodeEdit id="source-editor" name="SourceEditor" custom_minimum_size="Vector2(0,500)"
                    size_flags_vertical="3" wrap_mode="1"/>
          <HBoxContainer theme_override_constants_separation="16">
            <Button id="apply-button" name="PublishButton" text="PUBLISH FOR EVERYONE"
                    custom_minimum_size="Vector2(330,54)"/>
            <Label id="diagnostics" name="Diagnostics" text="Starting…"
                   size_flags_horizontal="3" vertical_alignment="1"/>
          </HBoxContainer>
        </VBoxContainer>
      </PanelContainer>
    </WorldUiCanvas>

    <MeshInstance3D id="shader-plane" name="ShaderPreview" position="Vector3(3.2,2.3,-6)"
                    mesh="SubResource:::PreviewMesh"
                    material_override="SubResource:::PreviewFallback"/>
    <Label3D position="Vector3(3.2,4.35,-6)" text="SHARED PREVIEW"
             font_size="52" pixel_size="0.005" outline_size="10"/>

    <MeshInstance3D position="Vector3(0,-0.1,-3)" mesh="SubResource:::FloorMesh"
                    material_override="SubResource:::FloorMaterial">
      <StaticBody3D><CollisionShape3D shape="SubResource:::FloorShape"/></StaticBody3D>
    </MeshInstance3D>

    <VRWebSpawner mode="first">
      <SpawnerPoint transform="Transform3D(1,0,0, 0,1,0, 0,0,1, 0,0,0)"/>
    </VRWebSpawner>

    <Resource id="PreviewMesh" type="QuadMesh" size="Vector2(4.6,3.2)"/>
    <Resource id="PreviewFallback" type="StandardMaterial3D"
              albedo_color="Color(0.08,0.12,0.2,1)"/>
    <Resource id="FloorMesh" type="BoxMesh" size="Vector3(16,0.2,16)"/>
    <Resource id="FloorShape" type="BoxShape3D" size="Vector3(16,0.2,16)"/>
    <Resource id="FloorMaterial" type="StandardMaterial3D"
              albedo_color="Color(0.06,0.08,0.12,1)" roughness="0.9"/>
    <Resource id="Environment" type="Environment"
              background_mode="1" background_color="Color(0.015,0.025,0.055,1)"
              ambient_light_source="3" ambient_light_color="Color(0.3,0.42,0.7,1)"
              ambient_light_energy="0.65"/>
  </vrwml>
</body>
</html>
