<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VRWeb linked Luau script</title>
  <!-- UTILITY/MODEL: declares the global SpeedModel class for later scripts. -->
  <script type="application/vrweb+luau" id="demo.external.model"
          src="external_model.luau"></script>
  <!-- VIEW: uses SpeedModel and declares SpinnerView in the same page realm. -->
  <script type="application/vrweb+luau" id="demo.external.view"
          src="external_tiny.luau"></script>
  <!-- CONTROLLER: inline on purpose; it constructs and connects both classes above. -->
  <script type="application/vrweb+luau" id="demo.external.controller">
local button = document.query("#external-button")
local controller_status = document.query("#controller-status")
local model_status = document.query("#model-status")
local spinner = document.query("#external-spinner")
local label = document.query("#external-label")
local view_status = document.query("#view-status")

if not button or not controller_status or not model_status
    or not spinner or not label or not view_status then
  error("inline controller scene ids are missing")
end

-- Both globals were declared by the two preceding linked files.
assert(SpeedModel and SpinnerView)
local model = SpeedModel.new({ 0.5, 1.0, 2.0 })
local view = SpinnerView.new(model, spinner, label, view_status)
view:start()
model_status.set("text", string.format(
  "1 · external_model.luau\nSpeedModel instance = %.1fx",
  model:current_speed()))

button.on("activate", function(_event)
  local speed = model:cycle_speed()
  view:show_speed()
  model_status.set("text", string.format(
    "1 · external_model.luau\nSpeedModel instance = %.1fx",
    speed))
  controller_status.set("text",
    "3 · INLINE: model:cycle_speed() → view:show_speed()")
end, "Переключить скорость общей Luau-модели")
  </script>
</head>
<body>
  <vrwml mode="exclusive">
    <Node3D id="external-root" name="ExternalRoot" position="Vector3(0,1.7,-3)">
      <Label3D id="external-label" name="ExternalLabel" position="Vector3(0,1.65,0)"
               text="Loading three script modules..." font_size="42"/>
      <MeshInstance3D id="external-spinner" name="ExternalSpinner"
                      mesh="SubResource:::SpinnerMesh"
                      material_override="SubResource:::SpinnerMaterial"/>
      <Label3D id="model-status" position="Vector3(-2.8,0.75,0)"
               text="1 · external_model.luau: loading..." font_size="27"/>
      <Label3D id="view-status" position="Vector3(2.8,0.75,0)"
               text="2 · external_tiny.luau: loading..." font_size="27"/>
      <StaticBody3D id="external-button" position="Vector3(0,-1.15,0)">
        <MeshInstance3D mesh="SubResource:::ButtonMesh"
                        material_override="SubResource:::ButtonMaterial">
          <Label3D position="Vector3(0,0,0.11)" text="СМЕНИТЬ СКОРОСТЬ"
                   font_size="34" outline_size="8" pixel_size="0.005"/>
        </MeshInstance3D>
        <CollisionShape3D shape="SubResource:::ButtonShape"/>
      </StaticBody3D>
      <Label3D id="controller-status" position="Vector3(0,-1.75,0)"
               text="3 · INLINE: создал model + view; нажмите кнопку" font_size="27"/>
    </Node3D>

    <Node3D name="Ground" position="Vector3(0,-0.1,0)">
      <MeshInstance3D mesh="SubResource:::GroundMesh" material_override="SubResource:::GroundMaterial"/>
      <StaticBody3D>
        <CollisionShape3D shape="SubResource:::GroundShape"/>
      </StaticBody3D>
    </Node3D>

    <Resource id="GroundMesh" type="BoxMesh" size="Vector3(14,0.2,14)"/>
    <Resource id="GroundShape" type="BoxShape3D" size="Vector3(14,0.2,14)"/>
    <Resource id="GroundMaterial" type="StandardMaterial3D" albedo_color="Color(0.20,0.14,0.10,1)"/>
    <Resource id="SpinnerMesh" type="BoxMesh" size="Vector3(0.8,0.8,0.8)"/>
    <Resource id="SpinnerMaterial" type="StandardMaterial3D"
              albedo_color="Color(0.15,0.75,1,1)"
              emission_enabled="true" emission="Color(0.02,0.25,0.55,1)"/>
    <Resource id="ButtonMesh" type="BoxMesh" size="Vector3(3.2,0.65,0.2)"/>
    <Resource id="ButtonShape" type="BoxShape3D" size="Vector3(3.2,0.65,0.2)"/>
    <Resource id="ButtonMaterial" type="StandardMaterial3D"
              albedo_color="Color(0.15,0.38,0.62,1)"/>
  </vrwml>
</body>
</html>
