<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VRWeb linked Luau script</title>
  <script type="application/vrweb+luau" id="external.tiny"
		  src="external_tiny.luau"></script>
</head>
<body>
  <vrwml mode="exclusive">
    <Node3D id="external-root" name="ExternalRoot" position="Vector3(0,1.7,-3)">
      <Label3D id="external-label" name="ExternalLabel" text="Loading external script..." font_size="48"/>
    </Node3D>

    <Node3D name="Ground" position="Vector3(0,-0.1,0)">
      <MeshInstance3D mesh="SubResource:::GroundMesh" material_override="SubResource:::GroundMaterial"/>
      <StaticBody3D>
        <CollisionShape3D shape="SubResource:::GroundShape"/>
      </StaticBody3D>
    </Node3D>

    <Resource id="GroundMesh" type="BoxMesh" size="Vector3(14,0.2,14)"/>
    <Resource id="GroundShape" type="BoxShape3D" size="Vector3(14,0.2,14)"/>
    <Resource id="GroundMaterial" type="StandardMaterial3D" albedo_color="Color(0.20,0.14,0.10,1)"/>
  </vrwml>
</body>
</html>
