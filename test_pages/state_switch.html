<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>VRWeb — Luau Distributed State lighting demo</title>
  <script type="application/vrweb+luau" id="demo.light-switch">
local button = document.query("#light-button")
local red_lamp = document.query("#red-lamp")
local green_lamp = document.query("#green-lamp")
local red_status = document.query("#red-status")
local green_status = document.query("#green-status")

if not button or not red_lamp or not green_lamp or not red_status or not green_status then
  error("lighting demo scene ids are missing")
end

local schema = "light"
local object = "switch"
local version = 1

assert(document.state.define(schema, {
  version = version,
  fields = {
    enabled = { type = "bool", default = false },
  },
  -- MVP пока оставляет user/instance permissions открытыми: команда доступна обычному rank.
  default_write_rule = { rank = { op = "lte", value = 1073741824 } },
  commands = {
    toggle = {
      reducer = function(event)
        return { enabled = not event.state.enabled }
      end,
    },
  },
}))
assert(document.state.ensure(object, schema, { enabled = false }, ""))

local function render(state)
  local enabled = state.enabled == true
  red_lamp.set("visible", not enabled)
  red_status.set("visible", not enabled)
  green_lamp.set("visible", enabled)
  green_status.set("visible", enabled)
end

render(document.state.read(object, schema))
document.state.on(object, schema, function(event)
  render(event.state)
end)

button.on("activate", function(_event)
  document.state.command(object, schema, version, "toggle", {})
end, "Переключить общий свет")
  </script>
</head>
<body>
  <vrwml mode="exclusive">
    <MeshInstance3D mesh="SubResource:::FloorMesh"
                    transform="Transform3D(1,0,0, 0,1,0, 0,0,1, 0,0.05,0)">
      <StaticBody3D>
        <CollisionShape3D shape="SubResource:::FloorShape"/>
      </StaticBody3D>
    </MeshInstance3D>

    <WorldEnvironment environment="SubResource:::Environment"/>
    <DirectionalLight3D rotation_degrees="Vector3(-55,-25,0)" light_energy="0.7"/>

    <!-- В сцене только обычные объекты. Поведение, distributed state и bindings находятся
         в inline Luau выше и обращаются к объектам через стабильные id. -->
    <Node3D name="LightSwitch"
            transform="Transform3D(1,0,0, 0,1,0, 0,0,1, 0,1.25,-4)">
      <StaticBody3D id="light-button" name="Button">
        <MeshInstance3D mesh="SubResource:::ButtonMesh"
                        material_override="SubResource:::ButtonMaterial">
          <Label3D position="Vector3(0,0,0.071)" text="ПЕРЕКЛЮЧИТЬ"
                   font_size="48" outline_size="10" pixel_size="0.005"/>
        </MeshInstance3D>
        <CollisionShape3D name="Collision" shape="SubResource:::ButtonShape"/>
      </StaticBody3D>

      <MeshInstance3D id="red-lamp" name="RedLamp" position="Vector3(0,1.65,0)"
                      mesh="SubResource:::LampMesh" material_override="SubResource:::RedMaterial">
        <OmniLight3D light_color="Color(0.95,0.08,0.05,1)" omni_range="8"
                     light_energy="4" shadow_enabled="true"/>
      </MeshInstance3D>
      <MeshInstance3D id="green-lamp" name="GreenLamp" position="Vector3(0,1.65,0)" visible="false"
                      mesh="SubResource:::LampMesh" material_override="SubResource:::GreenMaterial">
        <OmniLight3D light_color="Color(0.08,0.95,0.18,1)" omni_range="8"
                     light_energy="4" shadow_enabled="true"/>
      </MeshInstance3D>
      <Label3D id="red-status" name="RedStatus" position="Vector3(0,0.72,0)" text="СВЕТ: КРАСНЫЙ"
               modulate="Color(0.95,0.08,0.05,1)" font_size="44" outline_size="10" pixel_size="0.005"/>
      <Label3D id="green-status" name="GreenStatus" position="Vector3(0,0.72,0)" text="СВЕТ: ЗЕЛЁНЫЙ"
               modulate="Color(0.08,0.95,0.18,1)" visible="false"
               font_size="44" outline_size="10" pixel_size="0.005"/>
    </Node3D>

    <Label3D text="REPlicated State: общий переключатель"
             position="Vector3(0,3.6,-4)" font_size="52" pixel_size="0.006"/>
    <Label3D text="Нажмите кнопку в любом экземпляре — цвет сменится у всех"
             position="Vector3(0,3.1,-4)" font_size="32" pixel_size="0.005"/>

    <VRWebSpawner mode="first">
      <SpawnerPoint transform="Transform3D(1,0,0, 0,1,0, 0,0,1, 0,0,-1)"/>
    </VRWebSpawner>

    <Resource id="FloorMesh" type="BoxMesh" size="Vector3(14,0.1,14)"/>
    <Resource id="FloorShape" type="BoxShape3D" size="Vector3(14,0.1,14)"/>
    <Resource id="ButtonMesh" type="BoxMesh" size="Vector3(2.4,0.9,0.12)"/>
    <Resource id="ButtonShape" type="BoxShape3D" size="Vector3(2.4,0.9,0.16)"/>
    <Resource id="LampMesh" type="SphereMesh" radius="0.52" height="1.04"/>
    <Resource id="ButtonMaterial" type="StandardMaterial3D"
              albedo_color="Color(0.12,0.16,0.24,1)" metallic="0.2" roughness="0.45"/>
    <Resource id="RedMaterial" type="StandardMaterial3D" albedo_color="Color(0.95,0.08,0.05,1)"
              emission_enabled="true" emission="Color(0.95,0.08,0.05,1)" emission_energy_multiplier="3"/>
    <Resource id="GreenMaterial" type="StandardMaterial3D" albedo_color="Color(0.08,0.95,0.18,1)"
              emission_enabled="true" emission="Color(0.08,0.95,0.18,1)" emission_energy_multiplier="3"/>
    <Resource id="Environment" type="Environment"
              background_mode="2" background_color="Color(0.025,0.035,0.06,1)"
              ambient_light_source="3" ambient_light_color="Color(0.18,0.22,0.35,1)"
              ambient_light_energy="0.55"/>
  </vrwml>
</body>
</html>
