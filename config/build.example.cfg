; Шаблон приватной конфигурации сборки.
;
; Скопируйте этот файл в config/build.private.cfg и впишите реальные адреса.
; build.private.cfg в .gitignore — он НЕ попадает в репозиторий, но запекается в билд
; (см. include_filter в export_presets.cfg). Подробно — docs/build-config.md.
;
; Формат — обычный Godot ConfigFile. Значение ice_servers — это Dictionary ровно той
; структуры, что ждёт WebRTCPeerConnection.initialize().

[net]

; Адрес сигнального сервера. http(s):// нормализуется в ws(s):// автоматически (NetworkManager._ws_url).
signaling_url="https://signaling.example.com"

[webrtc]

; ICE/TURN-серверы. username/credential нужны только для turn:/turns:.
ice_servers={
"iceServers": [{
"urls": ["stun:stun.l.google.com:19302"]
}, {
"urls": "turn:turn.example.com:3478",
"username": "REPLACE_ME",
"credential": "REPLACE_ME"
}]
}
